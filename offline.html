<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Offline Page</title>
	<style>
		body {
			margin: 0;
			padding: 0;
			font-family: Arial, sans-serif;
			background-color: #f7f7f7;
			color: #333;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			text-align: center;
		}

		.container {
			background-color: white;
			border-radius: 10px;
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
			padding: 40px;
			max-width: 400px;
			width: 100%;
		}

		.offline-icon img {
			width: 100px;
			margin-bottom: 20px;
		}

		h1 {
			font-size: 24px;
			margin-bottom: 10px;
		}

		p {
			font-size: 16px;
			margin-bottom: 20px;
		}

		button {
			background-color: #007bff;
			color: white;
			border: none;
			padding: 10px 20px;
			border-radius: 5px;
			cursor: pointer;
			font-size: 16px;
			transition: background-color 0.3s;
		}

		button:hover {
			background-color: #0056b3;
		}

	</style>

</head>
<body>
<div class="container">
	<div class="offline-icon">
		<img src="https://img.icons8.com/ios-filled/100/000000/offline.png" alt="Offline Icon" />
	</div>
	<h1>You Are Offline</h1>
	<p>It seems that you are not connected to the internet.</p>
	<p>Please check your connection and try again.</p>
	<button onclick="location.reload();">Refresh Page</button>
</div>
</body>
</html>
